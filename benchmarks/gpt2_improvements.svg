<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">GPT-2 optimization progress over time</title>
  <desc id="desc">Line chart tracking best total tokens per second after each optimization slice, plus cumulative best performance.</desc>
  <rect width="1200" height="640" fill="#ffffff"/>

  <text x="48" y="42" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">GPT-2 optimization progress</text>
  <text x="48" y="70" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Best total tokens/sec from each recorded slice in benchmarks/gpt2_experiment_history.csv. Higher is better.</text>

  <rect x="110" y="90" width="970" height="380" fill="#ffffff"/>
  <line x1="110" y1="470" x2="1080" y2="470" stroke="#d1d5db" stroke-width="1"/>
  <line x1="110" y1="90" x2="110" y2="470" stroke="#d1d5db" stroke-width="1"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
    <text x="96" y="474" text-anchor="end">0</text>
    <text x="96" y="390" text-anchor="end">20</text>
    <text x="96" y="306" text-anchor="end">40</text>
    <text x="96" y="221" text-anchor="end">60</text>
    <text x="96" y="137" text-anchor="end">80</text>
  </g>
  <g stroke="#f3f4f6" stroke-width="1">
    <line x1="110" y1="385.6" x2="1080" y2="385.6"/>
    <line x1="110" y1="301.1" x2="1080" y2="301.1"/>
    <line x1="110" y1="216.7" x2="1080" y2="216.7"/>
    <line x1="110" y1="132.2" x2="1080" y2="132.2"/>
  </g>

  <polyline points="120,405.7 273,407.8 427,127.4 580,236.8 733,186.6 887,227.9 1040,366.0" fill="none" stroke="#2563eb" stroke-width="3"/>
  <polyline points="120,405.7 273,405.7 427,127.4 580,127.4 733,127.4 887,127.4 1040,127.4" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 6"/>

  <g fill="#2563eb" stroke="#ffffff" stroke-width="2">
    <circle cx="120" cy="405.7" r="5"/>
    <circle cx="273" cy="407.8" r="5"/>
    <circle cx="427" cy="127.4" r="5"/>
    <circle cx="580" cy="236.8" r="5"/>
    <circle cx="733" cy="186.6" r="5"/>
    <circle cx="887" cy="227.9" r="5"/>
    <circle cx="1040" cy="366.0" r="5"/>
  </g>
  <g fill="#16a34a" stroke="#ffffff" stroke-width="2">
    <circle cx="120" cy="405.7" r="5"/>
    <circle cx="273" cy="405.7" r="5"/>
    <circle cx="427" cy="127.4" r="5"/>
    <circle cx="580" cy="127.4" r="5"/>
    <circle cx="733" cy="127.4" r="5"/>
    <circle cx="887" cy="127.4" r="5"/>
    <circle cx="1040" cy="127.4" r="5"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="12" fill="#111827">
    <text x="120" y="394" text-anchor="middle">15.22</text>
    <text x="273" y="428" text-anchor="middle">14.72</text>
    <text x="427" y="116" text-anchor="middle">81.12</text>
    <text x="580" y="225" text-anchor="middle">55.23</text>
    <text x="733" y="175" text-anchor="middle">67.11</text>
    <text x="887" y="216" text-anchor="middle">57.33</text>
    <text x="1040" y="354" text-anchor="middle">24.62</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="12" fill="#374151">
    <text x="120" y="504" text-anchor="middle">Borrowed</text>
    <text x="120" y="520" text-anchor="middle">parallel</text>
    <text x="273" y="504" text-anchor="middle">Stream</text>
    <text x="273" y="520" text-anchor="middle">decode</text>
    <text x="427" y="504" text-anchor="middle">SIMD</text>
    <text x="427" y="520" text-anchor="middle">dot</text>
    <text x="580" y="504" text-anchor="middle">Experiment</text>
    <text x="580" y="520" text-anchor="middle">stats</text>
    <text x="733" y="504" text-anchor="middle">Tuning</text>
    <text x="733" y="520" text-anchor="middle">flags</text>
    <text x="887" y="504" text-anchor="middle">Quant f32</text>
    <text x="887" y="520" text-anchor="middle">baseline</text>
    <text x="1040" y="504" text-anchor="middle">Quant</text>
    <text x="1040" y="520" text-anchor="middle">int8</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#111827">
    <line x1="824" y1="48" x2="868" y2="48" stroke="#2563eb" stroke-width="3"/>
    <circle cx="846" cy="48" r="5" fill="#2563eb" stroke="#ffffff" stroke-width="2"/>
    <text x="878" y="53">Best for slice</text>
    <line x1="824" y1="72" x2="868" y2="72" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 6"/>
    <circle cx="846" cy="72" r="5" fill="#16a34a" stroke="#ffffff" stroke-width="2"/>
    <text x="878" y="77">Cumulative best</text>
  </g>

  <text x="110" y="586" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Note: quantized int8 is tracked as an experimental storage path and is currently slower than the f32 reference on this sweep.</text>
  <text x="110" y="606" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Source: benchmarks/gpt2_experiment_history.csv, using best total_tokens_per_second per optimization slice.</text>
</svg>
